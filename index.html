<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <title>Opensky</title>
  
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <!-- Loading Screen -->
  <div class="loading-screen" id="loadingScreen">
    <div class="loader-content">
      <div class="logo-container">
        <svg width="80" height="80" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
          <rect width="400" height="400" fill="white" />
          <g transform="translate(200, 200) rotate(-15)">
            <ellipse cx="0" cy="-60" rx="12" ry="18" fill="black" />
            <g fill="none" stroke="black">
              <path d="M-20,40 C-80,120 120,120 80,-40 C60,-120 -60,-120 -80,-40 C-100,60 40,160 140,40" stroke-width="2.5" opacity="0.9" />
              <path d="M-10,-55 C-30,-90 30,-90 10,-55 C-10,-20 30,-20 10,15" stroke-width="3" />
            </g>
          </g>
        </svg>
      </div>

      <h1 class="loader-title">Opensky</h1>
      <p class="loader-status" id="loadingLabel">Initializing System...</p>
      
      <div class="progress-container">
        <div class="progress-bar" id="sliderFill"></div>
      </div>
      <div class="progress-stats"><span id="loadingPercent">0%</span></div>
      
      <div id="modelStatusContainer" class="model-status-container"></div>
      <div id="debugLog"></div>
    </div>
  </div>

  <!-- App Container -->
  <div class="app-container" id="chatContainer">
    <!-- Header Removed as requested -->

    <main class="chat-area" id="messagesArea"></main>

    <footer class="input-area">
      <div class="input-wrapper">
        <textarea id="inputText" class="input-field" placeholder="Ask anything..." rows="1"></textarea>
        
        <button id="sendBtn" class="send-btn" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </footer>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
