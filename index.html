<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>opensky</title>
  <meta name="description" content="opensky — Advanced AI assistant with 27 tools, memory, and code execution">
  <meta name="theme-color" content="#000000">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><path d='M16 2L28 14L16 26L4 14L16 2Z' fill='white'/></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="bgCanvas"></canvas>

  <div class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <div class="logo">
        <svg class="logo-mark" viewBox="0 0 32 32" fill="none"><path d="M16 2L28 14L16 26L4 14L16 2Z" stroke="white" stroke-width="1.8"/><path d="M16 8L22 14L16 20L10 14L16 8Z" fill="white"/></svg>
        <span class="logo-word">opensky</span>
      </div>
      <div class="logo-sub">by hafij shaikh</div>
    </div>

    <div class="mode-selector" id="modeSelector">
      <button class="mode-btn active" data-mode="general">Chat</button>
      <button class="mode-btn" data-mode="research">Research</button>
      <button class="mode-btn" data-mode="coding">Code</button>
    </div>

    <button class="new-btn" id="newChatBtn">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      New chat
    </button>

    <div class="chat-list" id="chatList"></div>

    <div class="sidebar-foot">
      <div class="model-info">
        <span class="status-dot" id="statusDot"></span>
        <span id="modelLabel">free</span>
      </div>
    </div>
  </div>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="main">
    <div class="topbar">
      <button class="icon-btn mobile-only" id="menuToggle">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 12h18M3 6h18M3 18h18" stroke-linecap="round"/></svg>
      </button>
      <span class="topbar-title" id="topbarTitle">opensky</span>
      <span class="topbar-mode" id="topbarMode">Chat</span>
      <div class="topbar-spacer"></div>
      <button class="icon-btn" id="downloadChatBtn" title="Download chat">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button class="icon-btn" id="clearChatBtn" title="Clear chat">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <div class="chat-area" id="chatArea">
      <div class="chat-messages" id="chatMessages"></div>
    </div>

    <div class="input-area">
      <div class="file-preview" id="filePreview"></div>
      <input type="file" id="fileInput" hidden multiple>
      <div class="input-wrap">
        <div class="attach-wrap">
          <div class="attach-menu" id="attachMenu">
            <button class="attach-opt" data-type="image"><i class="fas fa-image" style="width:14px;text-align:center;color:var(--g3)"></i> Image</button>
            <button class="attach-opt" data-type="video"><i class="fas fa-video" style="width:14px;text-align:center;color:var(--g3)"></i> Video</button>
            <button class="attach-opt" data-type="file"><i class="fas fa-file-lines" style="width:14px;text-align:center;color:var(--g3)"></i> Document</button>
          </div>
          <button class="input-icon-btn" id="attachBtn" title="Attach file">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
        <div class="input-box" id="inputBox">
          <textarea id="messageInput" placeholder="Message opensky..." rows="1"></textarea>
        </div>
        <button class="send-btn mic-mode" id="sendBtn" title="Voice input"></button>
      </div>
    </div>
  </div>

  <div class="code-runner" id="codeRunner">
    <div class="runner-head">
      <span>Code Preview</span>
      <div class="runner-actions">
        <button class="runner-btn" id="runnerNewTab" title="Open in new tab">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="runner-btn" id="runnerClose" title="Close">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 6L6 18M6 6l12 12" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </div>
    <iframe class="runner-frame" id="runnerFrame" sandbox="allow-scripts allow-modals"></iframe>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="agent.js"></script>
  <script src="tools.js"></script>
  <script src="planner.js"></script>
  <script src="enhance.js"></script>
  <script src="app.js"></script>
</body>
</html>
