<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#000000">
<meta name="description" content="opensky — Advanced AI Agent by Hafij Shaikh">
<title>opensky</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<canvas id="bgCanvas"></canvas>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-head">
    <div class="logo">
      <svg class="logo-mark" viewBox="0 0 32 32" fill="none"><path d="M16 2L28 14L16 26L4 14L16 2Z" stroke="white" stroke-width="1.8"/><path d="M16 8L22 14L16 20L10 14L16 8Z" fill="white"/></svg>
      <span class="logo-word">opensky</span>
    </div>
    <div class="logo-sub">by Hafij Shaikh</div>
  </div>
  <div class="mode-selector" id="modeSelector">
    <button class="mode-btn active" data-mode="general"><i class="fas fa-comment" style="font-size:9px"></i> Chat</button>
    <button class="mode-btn" data-mode="research"><i class="fas fa-flask" style="font-size:9px"></i> Research</button>
    <button class="mode-btn" data-mode="coding"><i class="fas fa-code" style="font-size:9px"></i> Code</button>
  </div>
  <button class="new-btn" id="newChatBtn"><i class="fas fa-plus" style="font-size:9px"></i> New chat</button>
  <div class="chat-list" id="chatList"></div>
  <div class="sidebar-foot">
    <div style="display:flex;align-items:center;gap:5px;margin-bottom:6px">
      <span class="status-dot" id="statusDot"></span>
      <span class="model-info" id="modelLabel">openrouter/free</span>
    </div>
    <div style="display:flex;gap:4px">
      <button class="icon-btn" id="clearChatBtn" title="Clear chat"><i class="fas fa-eraser" style="font-size:10px"></i></button>
      <button class="icon-btn" id="downloadChatBtn" title="Download chat"><i class="fas fa-download" style="font-size:10px"></i></button>
    </div>
  </div>
</aside>
<main class="main">
  <div class="topbar">
    <button class="icon-btn mobile-only" id="menuToggle" title="Menu"><i class="fas fa-bars" style="font-size:11px"></i></button>
    <span class="topbar-title" id="topbarTitle">opensky</span>
    <span class="topbar-mode" id="topbarMode">Chat</span>
    <span class="topbar-spacer"></span>
  </div>
  <div class="chat-area" id="chatArea">
    <div class="chat-messages" id="chatMessages"></div>
  </div>
  <div class="file-preview" id="filePreview"></div>
  <div class="input-area">
    <div class="input-wrap">
      <div class="attach-wrap">
        <button class="input-icon-btn" id="attachBtn" title="Attach file">
          <svg width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M13.5 3.5a3.5 3.5 0 00-5 0L4 8l6.5 6.5L15 10a3.5 3.5 0 000-5l-1.5-1.5z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/><path d="M4 8l-1.5 4 4-1.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="attach-menu" id="attachMenu">
          <button class="attach-opt" data-type="image"><i class="fas fa-image" style="font-size:11px;width:16px;text-align:center;color:var(--g2)"></i> Image</button>
          <button class="attach-opt" data-type="video"><i class="fas fa-video" style="font-size:11px;width:16px;text-align:center;color:var(--g2)"></i> Video</button>
          <button class="attach-opt" data-type="document"><i class="fas fa-file-lines" style="font-size:11px;width:16px;text-align:center;color:var(--g2)"></i> Document</button>
        </div>
      </div>
      <div class="input-box">
        <textarea id="messageInput" rows="1" placeholder="Message opensky..." spellcheck="false"></textarea>
        <button class="send-btn mic-mode" id="sendBtn" title="Voice input">
          <svg width="16" height="16" viewBox="0 0 20 20" fill="none"><rect x="7" y="2" width="6" height="10" rx="3" stroke="currentColor" stroke-width="1.3"/><path d="M4 9a6 6 0 0012 0" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M10 15v3M7 18h6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>
    <input type="file" id="fileInput" multiple hidden>
  </div>
</main>
<div class="code-runner" id="codeRunner">
  <div class="runner-head">
    <span><i class="fas fa-play" style="font-size:9px;margin-right:6px;opacity:.5"></i>Live Preview</span>
    <div class="runner-actions">
      <button class="runner-btn" id="runnerNewTab" title="Open in new tab"><i class="fas fa-external-link" style="font-size:10px"></i></button>
      <button class="runner-btn" id="runnerClose" title="Close"><i class="fas fa-xmark" style="font-size:11px"></i></button>
    </div>
  </div>
  <iframe class="runner-frame" id="runnerFrame" sandbox="allow-scripts allow-modals allow-forms allow-same-origin" title="Code Preview"></iframe>
</div>
<div class="toast-container" id="toastContainer"></div>
<script src="agent.js"></script>
<script src="tools.js"></script>
<script src="planner.js"></script>
<script src="enhance.js"></script>
<script src="app.js"></script>
</body>
</html>
