<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>opensky</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <canvas id="bgCanvas"></canvas>

  <div class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <div class="logo">
        <svg class="logo-mark" viewBox="0 0 32 32" fill="none"><path d="M16 2L28 14L16 26L4 14L16 2Z" stroke="white" stroke-width="1.8"/><path d="M16 8L22 14L16 20L10 14L16 8Z" fill="white"/></svg>
        <span class="logo-word">opensky</span>
      </div>
      <div class="logo-sub">by Hafij Shaikh</div>
    </div>
    <div class="mode-selector" id="modeSelector">
      <button class="mode-btn active" data-mode="general">Chat</button>
      <button class="mode-btn" data-mode="research">Research</button>
      <button class="mode-btn" data-mode="coding">Code</button>
    </div>
    <button class="new-btn" id="newChatBtn">
      <i class="fas fa-plus" style="font-size:10px"></i> New chat
    </button>
    <div class="chat-list" id="chatList"></div>
    <div class="sidebar-foot">
      <div class="model-info">
        <span class="status-dot" id="statusDot"></span>
        <span id="modelLabel">---</span>
      </div>
    </div>
  </div>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="main">
    <div class="topbar">
      <button class="icon-btn mobile-only" id="menuToggle">
        <i class="fas fa-bars" style="font-size:12px"></i>
      </button>
      <span class="topbar-title" id="topbarTitle">opensky</span>
      <span class="topbar-mode" id="topbarMode">Chat</span>
      <span class="topbar-spacer"></span>
      <button class="icon-btn" id="downloadChatBtn" title="Download chat">
        <i class="fas fa-download" style="font-size:11px"></i>
      </button>
      <button class="icon-btn" id="clearChatBtn" title="Clear chat">
        <i class="fas fa-trash" style="font-size:11px"></i>
      </button>
    </div>

    <div class="chat-area" id="chatArea">
      <div class="chat-messages" id="chatMessages"></div>
    </div>

    <div class="input-area">
      <div class="file-preview" id="filePreview"></div>
      <div class="input-wrap">
        <div class="attach-wrap">
          <button class="input-icon-btn" id="attachBtn" title="Attach file">
            <i class="fas fa-paperclip" style="font-size:13px"></i>
          </button>
          <div class="attach-menu" id="attachMenu">
            <button class="attach-opt" data-type="image">
              <i class="fas fa-image" style="font-size:12px"></i> Image
            </button>
            <button class="attach-opt" data-type="video">
              <i class="fas fa-video" style="font-size:12px"></i> Video
            </button>
            <button class="attach-opt" data-type="document">
              <i class="fas fa-file-lines" style="font-size:12px"></i> Document
            </button>
          </div>
        </div>
        <div class="input-box">
          <textarea id="messageInput" rows="1" placeholder="Message opensky..."></textarea>
          <button class="send-btn" id="sendBtn">
            <svg width="15" height="15" viewBox="0 0 18 18" fill="none"><path d="M3 9h12M10 4l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="code-runner" id="codeRunner">
    <div class="runner-head">
      <span>Preview</span>
      <div class="runner-actions">
        <button class="runner-btn" id="runnerNewTab" title="Open in new tab">
          <i class="fas fa-up-right-from-square" style="font-size:11px"></i>
        </button>
        <button class="runner-btn" id="runnerClose" title="Close">
          <i class="fas fa-xmark" style="font-size:11px"></i>
        </button>
      </div>
    </div>
    <iframe class="runner-frame" id="runnerFrame" sandbox="allow-scripts"></iframe>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <div class="drop-overlay" id="dropOverlay">
    <div class="drop-zone">
      <i class="fas fa-cloud-arrow-up"></i>
      Drop files here
    </div>
  </div>
  <input type="file" id="fileInput" style="display:none" multiple>

  <script src="agent.js"></script>
  <script src="tools.js"></script>
  <script src="planner.js"></script>
  <script src="enhance.js"></script>
  <script src="app.js"></script>
</body>
</html>
