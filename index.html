<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sky | AI Workspace</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Sidebar Overlay (Mobile) -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Floating Context Menu -->
    <div id="context-menu" class="context-menu">
        <button class="ctx-btn" id="ctx-edit"><i class="fa-solid fa-pen"></i> Edit</button>
        <button class="ctx-btn" id="ctx-copy"><i class="fa-solid fa-copy"></i> Copy Text</button>
    </div>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="brand"><i class="fa-solid fa-cloud"></i> Sky</div>
            </div>
            
            <button class="new-chat-btn" id="new-chat-btn"><i class="fa-solid fa-plus"></i> New Session</button>

            <div class="session-list" id="session-list"></div>
            
            <div class="sidebar-footer">
                <div class="status-pill" id="status-pill">
                    <div class="status-dot" id="status-dot"></div>
                    <span class="status-text" id="status-text">System Offline</span>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <!-- Mobile Header -->
            <div class="mobile-header">
                <button class="menu-toggle" id="menu-toggle"><i class="fa-solid fa-bars"></i></button>
                <span class="mobile-title">Sky Workspace</span>
            </div>

            <!-- Chat Area -->
            <div class="chat-viewport" id="chat-viewport">
                <div class="chat-container" id="chat-list">
                    <div class="message-row sky">
                        <div class="message-content welcome-banner">
                            <h2>Welcome to <strong>Sky Workspace</strong></h2>
                            <p>Send a message to initialize the AI.<br>The model (approx 6GB) will be downloaded automatically.</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Input Area -->
            <div class="input-dock-wrapper">
                <div class="upload-preview-area" id="upload-preview-area"></div>
                <div class="input-dock">
                    <input type="file" id="file-input" hidden multiple accept="image/*,.pdf">
                    <button id="upload-btn" class="dock-btn" title="Upload Image/PDF"><i class="fa-solid fa-paperclip"></i></button>
                    <textarea id="msg-input" rows="1" placeholder="Message Sky..."></textarea>
                    <button id="send-btn" class="dock-btn send-btn" aria-label="Send"><i class="fa-solid fa-arrow-up"></i></button>
                </div>
            </div>
        </main>
    </div>

    <!-- Initial Loader Overlay (Restored from original) -->
    <div class="loader-overlay" id="loader-overlay">
        <i class="fa-solid fa-microchip loader-icon"></i>
        <h2 class="modal-title">Initializing Sky</h2>
        <p class="modal-desc" id="loader-log">Waiting...</p>
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
    </div>

    <!-- Main Script -->
    <script type="module" src="script.js"></script>
</body>
</html>
