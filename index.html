<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opensky</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Loading -->
<div id="loadingScreen" class="loading-screen">
  <div class="loader-content">
    <div class="loader-title">Opensky</div>
    <div class="skeleton title"></div>
    <div class="skeleton bar"></div>
  </div>
</div>

<div class="app-container active">

  <!-- Header -->
  <div class="top-bar">
    <div class="app-title">Opensky</div>
    <button id="clearChat">Clear</button>
  </div>

  <!-- Chat -->
  <div id="messagesArea" class="chat-area"></div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-wrapper">
      <textarea id="inputText" class="input-field" placeholder="Ask anything..."></textarea>
      <button id="sendBtn" class="send-btn">➤</button>
    </div>
  </div>

</div>

<script type="module" src="script.js"></script>
</body>
</html>
