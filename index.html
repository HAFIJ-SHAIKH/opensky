<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>opensky</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="bgCanvas"></canvas>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <div class="logo">
        <svg class="logo-mark" viewBox="0 0 32 32" fill="none"><path d="M16 2L28 14L16 26L4 14L16 2Z" stroke="white" stroke-width="2"/><path d="M16 8L22 14L16 20L10 14L16 8Z" fill="white"/></svg>
        <span class="logo-word">opensky</span>
      </div>
      <div class="logo-sub">by Hafij Shaikh</div>
    </div>
    <div class="mode-selector" id="modeSelector">
      <button class="mode-btn active" data-mode="general"><svg width="11" height="11" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.2"/></svg>Chat</button>
      <button class="mode-btn" data-mode="research"><svg width="11" height="11" viewBox="0 0 16 16" fill="none"><path d="M7 1a6 6 0 014.24 10.24l3.76 3.76-1.06 1.06-3.76-3.76A6 6 0 117 1z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>Research</button>
      <button class="mode-btn" data-mode="coding"><svg width="11" height="11" viewBox="0 0 16 16" fill="none"><path d="M5.5 4L2 8l3.5 4M10.5 4L14 8l-3.5 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>Code</button>
    </div>
    <button class="new-btn" id="newChatBtn"><svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>New chat</button>
    <div class="chat-list" id="chatList"></div>
    <div class="sidebar-foot">
      <div class="model-info"><span class="status-dot" id="statusDot"></span><span id="modelLabel">openrouter/free</span></div>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <button class="icon-btn mobile-only" id="menuToggle" aria-label="Menu"><svg width="17" height="17" viewBox="0 0 18 18" fill="none"><path d="M2 4.5h14M2 9h14M2 13.5h14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg></button>
      <span class="topbar-title" id="topbarTitle">opensky</span>
      <span class="topbar-mode" id="topbarMode">Chat</span>
      <div class="topbar-spacer"></div>
      <button class="icon-btn" id="downloadChatBtn" title="Download"><svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M8 2v8m0 0l-3-3m3 3l3-3M2 12v2h12v-2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      <button class="icon-btn" id="clearChatBtn" title="Clear"><svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M2 4h12M5.3 4V2.7a.7.7 0 01.7-.7h4a.7.7 0 01.7.7V4M6.3 7v4.5M9.7 7v4.5M3 4l.7 9a1 1 0 001 1h6.6a1 1 0 001-1L13 4" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    </header>
    <div class="chat-area" id="chatArea"><div class="chat-messages" id="chatMessages"></div></div>
    <div class="input-area">
      <div class="file-preview" id="filePreview"></div>
      <div class="input-wrap">
        <div class="input-box">
          <div class="attach-wrap">
            <button class="input-icon-btn" id="attachBtn" title="Attach"><svg width="17" height="17" viewBox="0 0 20 20" fill="none"><path d="M15.5 5.5l-8 8M15.5 5.5l-4-1 1 4M15.5 5.5L7 14a3 3 0 004.24 4.24l8.5-8.5a5 5 0 00-7.07-7.07L4 11.34a7 7 0 009.9 9.9" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
            <div class="attach-menu" id="attachMenu">
              <button class="attach-opt" data-type="image"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="1" y="2" width="14" height="12" rx="2" stroke="currentColor" stroke-width="1.1"/><circle cx="5" cy="6" r="1.2"/><path d="M1 11l3.5-3.5 2 2L11 5l4 4" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/></svg>Image</button>
              <button class="attach-opt" data-type="video"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="1" y="3" width="10" height="10" rx="2" stroke="currentColor" stroke-width="1.1"/><path d="M11 6l4-2v8l-4-2" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/></svg>Video</button>
              <button class="attach-opt" data-type="document"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M4 1h5l4 4v9a1 1 0 01-1 1H4a1 1 0 01-1-1V2a1 1 0 011-1z" stroke="currentColor" stroke-width="1.1"/><path d="M9 1v4h4" stroke="currentColor" stroke-width="1.1"/></svg>Document</button>
            </div>
          </div>
          <button class="input-icon-btn" id="micBtn" title="Voice"><svg width="15" height="15" viewBox="0 0 18 18" fill="none"><path d="M9 1a3 3 0 00-3 3v4a3 3 0 006 0V4a3 3 0 00-3-3z" stroke="currentColor" stroke-width="1.2"/><path d="M14 7v1a5 5 0 01-10 0V7M9 13v4M6 17h6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
          <input type="file" id="fileInput" multiple accept="image/*,video/*,.txt,.md,.json,.csv,.py,.js,.ts,.html,.css,.xml,.yaml,.yml,.sh,.c,.cpp,.h,.java,.rb,.go,.rs,.php,.sql,.log,.ini,.cfg" hidden>
          <textarea id="messageInput" rows="1" placeholder="Ask anything..."></textarea>
          <button class="send-btn" id="sendBtn" aria-label="Send"><svg width="15" height="15" viewBox="0 0 18 18" fill="none"><path d="M3 9h12M10 4l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        </div>
      </div>
    </div>
  </main>

  <div class="code-runner" id="codeRunner">
    <div class="runner-head"><span>Live Preview</span><div class="runner-actions"><button class="runner-btn" id="runnerNewTab" title="New tab"><svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M10 1h5v5M14 1L6 9M1 6v8a1 1 0 001 1h8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg></button><button class="runner-btn" id="runnerClose" title="Close"><svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg></button></div></div>
    <iframe id="runnerFrame" sandbox="allow-scripts allow-same-origin" class="runner-frame"></iframe>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <script src="agent.js"></script>
  <script src="tools.js"></script>
  <script src="planner.js"></script>
  <script src="app.js"></script>
</body>
</html>
