<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opensky</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ================= LOADING SCREEN ================= -->
<div id="loadingScreen" class="loading-screen">
  <div class="loader-box">
    <div class="loader-title">Opensky</div>
    <div class="loader-status" id="loaderStatus">Initializing...</div>

    <div class="loader-skeleton">
      <div class="sk-line"></div>
      <div class="sk-line"></div>
      <div class="sk-line short"></div>
    </div>
  </div>
</div>

<!-- ================= APP ================= -->
<div id="app" class="app-container">

  <!-- Header -->
  <div class="top-bar">
    <div class="app-title">Opensky</div>

    <div class="top-actions">
      <button id="clearChatBtn">Clear</button>
    </div>
  </div>

  <!-- Chat -->
  <div id="messagesArea" class="chat-area"></div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-wrapper">
      <textarea id="inputText" placeholder="Ask anything..."></textarea>

      <button id="sendBtn" class="send-btn">
        <span id="sendIcon">➤</span>
      </button>
    </div>
  </div>

</div>

<script type="module" src="script.js"></script>
</body>
</html>
