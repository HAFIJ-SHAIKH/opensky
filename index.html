<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opensky — AI Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Loading Screen -->
    <div id="loadingScreen" class="loading-screen">
        <div class="loader-box">
            <div class="loader-icon">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round"
                     stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                    <path d="M2 17l10 5 10-5"/>
                    <path d="M2 12l10 5 10-5"/>
                </svg>
            </div>
            <div class="loader-title">Opensky</div>
            <div class="loader-subtitle">by Hafij Shaikh</div>
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="loader-meta">
                <span id="loadingPercent">0.0%</span>
                <span class="status-text" id="loadingStatus">Initializing...</span>
            </div>
            <div class="loader-tips" id="loadingTips"><p>Loading...</p></div>
            <div class="error-box" id="errorBox" style="display:none;">
                <strong>Setup Required</strong>
                <p id="errorMessage"></p>
            </div>
        </div>
    </div>

    <!-- App Container -->
    <div class="app-container" id="appContainer" style="display:none;">

        <!-- Sidebar Overlay -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>Chats</h2>
                <button class="icon-btn" id="closeSidebarBtn" title="Close">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <path d="M18 6L6 18M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div class="history-list" id="historyList"></div>
            <div class="sidebar-footer">
                <button class="sidebar-action-btn" id="newChatBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <path d="M12 5v14M5 12h14"/>
                    </svg>
                    New Chat
                </button>
                <button class="sidebar-action-btn" id="clearChatBtn"
                        style="color:var(--color-error);">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0
                                 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                    </svg>
                    Delete All Chats
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">

            <!-- Top Bar -->
            <div class="top-bar">
                <div class="top-bar-left">
                    <button class="icon-btn" id="menuBtn" title="Menu">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="2" stroke-linecap="round">
                            <path d="M3 12h18M3 6h18M3 18h18"/>
                        </svg>
                    </button>
                    <span class="top-bar-title">Opensky</span>
                    <span class="top-bar-model" id="modelBadge"
                          title="Click to change model">Auto</span>
                    <span class="status-badge loading" id="statusBadge">Loading</span>
                </div>
                <div class="top-bar-right">
                    <button class="icon-btn" id="settingsBtn" title="Settings">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="2" stroke-linecap="round">
                            <circle cx="12" cy="12" r="3"/>
                            <path d="M12 1v2M12 21v2M4.22 4.22l1.42
                                     1.42M18.36 18.36l1.42 1.42M1 12h2M21
                                     12h2M4.22 19.78l1.42-1.42M18.36
                                     5.64l1.42-1.42"/>
                        </svg>
                    </button>
                    <button class="icon-btn" id="modelBtn" title="Change Model">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="2" stroke-linecap="round">
                            <rect x="2" y="3" width="20" height="14" rx="2"/>
                            <path d="M8 21h8M12 17v4"/>
                        </svg>
                    </button>
                    <button class="icon-btn" id="exportBtn" title="Export">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="2" stroke-linecap="round">
                            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0
                                     01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
                        </svg>
                    </button>
                    <div class="export-menu" id="exportMenu" style="display:none;">
                        <button class="export-menu-item" id="exportMdBtn">
                            <svg width="14" height="14" viewBox="0 0 24 24"
                                 fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0
                                         002 2h12a2 2 0 002-2V8z"/>
                                <path d="M14 2v6h6"/>
                            </svg>
                            Export as Markdown
                        </button>
                        <button class="export-menu-item" id="exportCopyBtn">
                            <svg width="14" height="14" viewBox="0 0 24 24"
                                 fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="9" y="9" width="13" height="13" rx="2"/>
                                <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0
                                         012-2h9a2 2 0 012 2v1"/>
                            </svg>
                            Copy to Clipboard
                        </button>
                    </div>
                </div>
            </div>

            <!-- Welcome Screen -->
            <div class="welcome-screen" id="welcomeScreen">
                <div class="welcome-icon">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                        <path d="M2 17l10 5 10-5"/>
                        <path d="M2 12l10 5 10-5"/>
                    </svg>
                </div>
                <h2>Welcome to Opensky</h2>
                <p>Your AI assistant powered by free OpenRouter models.
                   Ask anything, get intelligent responses.</p>
                <div class="suggestion-grid" id="suggestionGrid"></div>
            </div>

            <!-- Chat Area -->
            <div class="chat-area" id="chatArea"></div>

            <!-- Input Area -->
            <div class="input-area">
                <div class="input-container">
                    <span class="input-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="2" stroke-linecap="round">
                            <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2
                                     0 012-2h14a2 2 0 012 2z"/>
                        </svg>
                    </span>
                    <textarea id="inputText" rows="1"
                              placeholder="Type your message..."></textarea>
                    <button class="send-btn" id="sendBtn" disabled title="Send">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="2" stroke-linecap="round">
                            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                        </svg>
                    </button>
                </div>
                <div class="input-disclaimer">
                    Opensky uses free OpenRouter models. Responses may vary.
                </div>
            </div>

        </main>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay hidden" id="settingsModal">
        <div class="modal-content settings-modal">
            <div class="modal-header">
                <h2>Settings</h2>
                <button class="icon-btn close-modal-btn"
                        data-close="settingsModal" title="Close">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <path d="M18 6L6 18M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body" id="settingsBody"></div>
        </div>
    </div>

    <!-- Model Picker Modal -->
    <div class="modal-overlay hidden" id="modelPickerModal">
        <div class="modal-content model-picker-modal">
            <div class="modal-header">
                <h2>Model Picker</h2>
                <button class="icon-btn close-modal-btn"
                        data-close="modelPickerModal" title="Close">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <path d="M18 6L6 18M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body" id="modelPickerBody"></div>
        </div>
    </div>

    <!-- Confirm Dialog -->
    <div class="modal-overlay hidden" id="confirmDialog">
        <div class="modal-content" style="max-width:420px;">
            <div class="modal-body" id="confirmBody"></div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Templates -->
    <template id="tmplUserMsg">
        <div class="message user-msg">
            <div class="msg-bubble"></div>
            <div class="msg-actions">
                <button class="msg-action-btn copy-full-btn"
                        title="Copy">📋</button>
                <button class="msg-action-btn edit-btn"
                        title="Edit">✏️</button>
            </div>
        </div>
    </template>

    <template id="tmplAssistantMsg">
        <div class="message assistant-msg">
            <div class="msg-avatar">&#10022;</div>
            <div class="msg-content-wrapper">
                <div class="msg-status hidden">
                    <div class="thinking-dots"><span></span></div>
                    <span class="status-label">Thinking...</span>
                </div>
                <div class="content-body"></div>
                <div class="msg-meta-row">
                    <span class="msg-model-tag"></span>
                    <span class="msg-word-count"></span>
                </div>
                <div class="msg-actions">
                    <button class="msg-action-btn copy-full-btn"
                            title="Copy">📋</button>
                    <button class="msg-action-btn regen-btn"
                            title="Regenerate">🔄</button>
                </div>
            </div>
        </div>
    </template>

    <template id="tmplToast">
        <div class="toast-notification">
            <span class="toast-icon">&#10022;</span>
            <span class="toast-message"></span>
        </div>
    </template>

    <!-- Scripts loaded in order -->
    <script src="script-1.js"></script>
    <script src="script-2.js"></script>
    <script src="script-3.js"></script>
    <script src="script-4.js"></script>
    <script src="script-5.js"></script>
    <script src="script-6.js"></script>

</body>
          </html>
