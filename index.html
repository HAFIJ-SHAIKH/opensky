<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>opensky</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <canvas id="starfield"></canvas>
  <div class="ambient-blob one"></div>
  <div class="ambient-blob two"></div>
  <div class="ambient-blob three"></div>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon"><i class="fas fa-paper-plane"></i></div>
        <span class="logo-text">opensky</span>
      </div>
      <div class="logo-sub">Free AI Chat</div>
    </div>
    <button class="new-chat-btn" id="newChatBtn">
      <i class="fas fa-plus"></i> New Conversation
    </button>
    <div class="chat-list" id="chatList"></div>
    <div class="sidebar-footer">
      <div class="model-badge">
        <span class="dot"></span>
        <span id="modelLabel">openrouter/free &mdash; auto</span>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="topbar">
      <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
      <span class="topbar-title" id="topbarTitle">New Conversation</span>
      <span class="topbar-model">Free Tier</span>
      <div class="topbar-spacer"></div>
      <button class="topbar-action" id="clearChatBtn" title="Clear chat"><i class="fas fa-eraser"></i></button>
    </div>

    <div class="chat-area" id="chatArea">
      <div class="chat-messages" id="chatMessages"></div>
    </div>

    <div class="input-area">
      <div class="input-wrapper">
        <div class="input-box">
          <textarea id="messageInput" rows="1" placeholder="Message opensky..."></textarea>
          <button class="send-btn" id="sendBtn"><i class="fas fa-arrow-up"></i></button>
        </div>
        <div class="input-hint">Powered by OpenRouter &middot; Free models auto-selected &middot; Press Enter to send, Shift+Enter for new line</div>
      </div>
    </div>
  </main>

  <div class="toast-container" id="toastContainer"></div>

  <script src="script.js"></script>
</body>
</html>
