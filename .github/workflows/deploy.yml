name: Deploy opensky
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        env:
          OPENKEY: ${{ secrets.OPENKEY }}
        run: |
          python3 << 'PYEOF'
          import os, sys

          key = os.environ.get("OPENKEY", "")

          if not key or len(key) < 10:
              print("FAILED: OPENKEY secret is missing or too short (length: " + str(len(key)) + ")")
              sys.exit(1)

          print("Secret found. Length: " + str(len(key)))

          import shutil
          os.makedirs("build", exist_ok=True)

          for f in ["index.html", "style.css", "app.js", "agent.js", "tools.js", "planner.js", "enhance.js"]:
              if os.path.exists(f):
                  shutil.copy2(f, "build/" + f)
                  print("Copied: " + f)
              else:
                  print("WARNING: " + f + " not found, skipping")

          # utf-8-sig removes hidden BOM characters if your editor added them
          with open("build/app.js", "r", encoding="utf-8-sig") as file:
              content = file.read()

          new_content = None

          # Check for single quotes
          if "var KEY_PH = 'NONE';" in content:
              new_content = content.replace("var KEY_PH = 'NONE';", "var KEY_PH = '" + key + "';")
              print("Matched: Single quotes with NONE")

          # Check for double quotes
          elif 'var KEY_PH = "NONE";' in content:
              new_content = content.replace('var KEY_PH = "NONE";', 'var KEY_PH = "' + key + '";')
              print("Matched: Double quotes with NONE")

          # Check for empty single quotes
          elif "var KEY_PH = '';" in content:
              new_content = content.replace("var KEY_PH = '';", "var KEY_PH = '" + key + "';")
              print("Matched: Empty single quotes")

          # Check for empty double quotes
          elif 'var KEY_PH = "";' in content:
              new_content = content.replace('var KEY_PH = "";', 'var KEY_PH = "' + key + '";')
              print("Matched: Empty double quotes")

          if new_content:
              with open("build/app.js", "w", encoding="utf-8") as file:
                  file.write(new_content)
              print("SUCCESS: Key injected into build/app.js")
          else:
              print("FAILED: Could not find var KEY_PH in app.js")
              print("Showing first 20 lines of app.js for debugging:")
              for i, line in enumerate(content.split('\n')[:20]):
                  print(str(i) + ": " + line)
              sys.exit(1)

          PYEOF

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: './build'
      - id: deployment
        uses: actions/deploy-pages@v4
