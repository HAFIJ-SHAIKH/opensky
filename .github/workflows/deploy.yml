name: Deploy opensky

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject API key into JS
        run: |
          sed -i "s|__OPENKEY_PLACEHOLDER__|${{ secrets.OPENKEY }}|g" script.js

      - name: Verify key injection
        run: |
          if grep -q "__OPENKEY_PLACEHOLDER__" script.js; then
            echo "ERROR: OPENKEY secret is not set!"
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
