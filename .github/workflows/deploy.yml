name: Deploy opensky
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build
        env:
          OPENKEY: ${{ secrets.OPENKEY }}
        run: |
          mkdir -p build
          cp index.html build/ 2>/dev/null || true
          cp style.css build/ 2>/dev/null || true
          cp app.js build/
          node script.js

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: './build'
      - id: deployment
        uses: actions/deploy-pages@v4
