name: Deploy opensky
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        env:
          OPENKEY: ${{ secrets.OPENKEY }}
        run: |
          python3 << 'PYEOF'
          import os, re, shutil, sys

          key = os.environ.get("OPENKEY", "")
          os.makedirs("build", exist_ok=True)

          files = [
              "index.html", "style.css", "app.js",
              "agent.js", "tools.js", "planner.js", "enhance.js"
          ]
          for f in files:
              if os.path.exists(f):
                  shutil.copy2(f, "build/" + f)
                  print("OK  " + f)
              else:
                  print("MISS  " + f)

          with open("build/app.js", "r", encoding="utf-8-sig") as fh:
              code = fh.read()

          if key and len(key) >= 10:
              escaped = key.replace("\\", "\\\\").replace("'", "\\'")
              new_code = re.sub(
                  r"var\s+KEY_PH\s*=\s*['\"][NONE]*['\"]\s*;",
                  "var KEY_PH = '" + escaped + "';",
                  code
              )
              if new_code != code:
                  with open("build/app.js", "w", encoding="utf-8") as fh:
                      fh.write(new_code)
                  print("INJECTED  key length=" + str(len(key)))
              else:
                  print("WARN  regex matched nothing")
                  for i, ln in enumerate(code.split("\n")):
                      if "KEY_PH" in ln:
                          print("  line " + str(i) + ": " + repr(ln))
          else:
              print("NO_SECRET  manual entry mode active")

          PYEOF

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./build
      - id: deployment
        uses: actions/deploy-pages@v4
