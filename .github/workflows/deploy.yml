name: Deploy opensky
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        env:
          OPENKEY: ${{ secrets.OPENKEY }}
        run: |
          python3 << 'PYEOF'
          import os, sys, re

          key = os.environ.get("OPENKEY", "")

          if not key or len(key) < 10:
              print("FAILED: OPENKEY secret is missing or too short (length: " + str(len(key)) + ")")
              sys.exit(1)

          print("Secret found. Length: " + str(len(key)))

          import shutil
          os.makedirs("build", exist_ok=True)

          for f in ["index.html", "style.css", "app.js", "agent.js", "tools.js", "planner.js", "enhance.js"]:
              if os.path.exists(f):
                  shutil.copy2(f, "build/" + f)
                  print("Copied: " + f)
              else:
                  print("WARNING: " + f + " not found, skipping")

          with open("build/app.js", "r", encoding="utf-8-sig") as file:
              content = file.read()

          # Use regex — handles whitespace, quote styles, invisible chars
          pattern = r"""var\s+KEY_PH\s*=\s*['"](?:NONE|)['"]\s*;"""
          match = re.search(pattern, content)

          if not match:
              print("FAILED: Could not find KEY_PH assignment")
              print("Searching for 'KEY_PH' anywhere in file:")
              for i, line in enumerate(content.split('\n')):
                  if 'KEY_PH' in line:
                      print("  Line " + str(i) + ": " + repr(line))
              sys.exit(1)

          print("Found KEY_PH at position " + str(match.start()) + "-" + str(match.end()))
          print("Matched text: " + repr(match.group(0)))

          # Escape any single quotes in the key to prevent JS breakage
          safe_key = key.replace("'", "\\'")
          replacement = "var KEY_PH = '" + safe_key + "';"

          new_content = content[:match.start()] + replacement + content[match.end():]

          with open("build/app.js", "w", encoding="utf-8") as file:
              file.write(new_content)

          # Verify it was written correctly
          with open("build/app.js", "r", encoding="utf-8") as file:
              verify = file.read()
              if "var KEY_PH = '" + safe_key + "';" in verify:
                  print("VERIFIED: Key injected successfully")
              else:
                  print("WARNING: Verification failed")
                  sys.exit(1)

          PYEOF

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: './build'
      - id: deployment
        uses: actions/deploy-pages@v4
