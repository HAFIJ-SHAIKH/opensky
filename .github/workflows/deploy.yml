name: Deploy opensky
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build
        env:
          OPENKEY: ${{ secrets.OPENKEY }}
        run: |
          mkdir -p build
          cp index.html style.css app.js agent.js tools.js planner.js enhance.js build/

          cat > _inject.js << 'ENDSCRIPT'
          const fs = require('fs');
          const key = process.env.OPENKEY;

          if (!key || key.trim().length < 10) {
            console.error('FAILED: OPENKEY secret is missing or too short');
            console.error('Length received: ' + (key ? key.length : 0));
            process.exit(1);
          }

          let content = fs.readFileSync('build/app.js', 'utf8');
          const placeholder = "var KEY_PH = 'NONE';";

          if (content.indexOf(placeholder) === -1) {
            console.error('FAILED: Placeholder not found in build/app.js');
            process.exit(1);
          }

          const encoded = Buffer.from(key.trim()).toString('base64');
          const replacement = "var KEY_PH = atob('" + encoded + "');";
          content = content.replace(placeholder, replacement);
          fs.writeFileSync('build/app.js', content);

          console.log('SUCCESS: Key injected into build/app.js');
          console.log('Original key length: ' + key.trim().length);
          console.log('Base64 encoded length: ' + encoded.length);
          ENDSCRIPT

          node _inject.js

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: './build'
      - id: deployment
        uses: actions/deploy-pages@v4
