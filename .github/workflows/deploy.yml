name: Deploy opensky
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        env:
          OPENKEY: ${{ secrets.OPENKEY }}
        run: |
          python3 << 'PYEOF'
          import os, sys, re, glob, shutil

          key = os.environ.get("OPENKEY", "")
          if not key or len(key.strip()) < 10:
              print("FAILED: OPENKEY secret is missing or too short")
              sys.exit(1)
          key = key.strip()
          print("Secret found. Length: " + str(len(key)))

          os.makedirs("build", exist_ok=True)

          copied = 0
          for pattern in ["*.html", "*.css", "*.js"]:
              for f in glob.glob(pattern):
                  shutil.copy2(f, "build/" + f)
                  copied += 1
                  print("Copied: " + f)

          if copied == 0:
              print("FAILED: No html/css/js files found in repo root")
              sys.exit(1)

          print("Total files copied: " + str(copied))

          js_files = glob.glob("build/*.js")
          target = None
          for f in js_files:
              with open(f, "r", encoding="utf-8-sig") as fh:
                  if "KEY_PH" in fh.read():
                      target = f
                      break

          if not target:
              print("FAILED: No JS file contains KEY_PH")
              sys.exit(1)

          print("Found KEY_PH in: " + target)

          with open(target, "r", encoding="utf-8-sig") as fh:
              content = fh.read()

          pattern = r"var\s+KEY_PH\s*=\s*['\"]NONE['\"]\s*;"
          match = re.search(pattern, content)
          if not match:
              print("FAILED: KEY_PH placeholder not found")
              sys.exit(1)

          safe_key = key.replace("\\", "\\\\").replace("'", "\\'")
          new_content = content[:match.start()] + "var KEY_PH = '" + safe_key + "';" + content[match.end():]

          with open(target, "w", encoding="utf-8") as fh:
              fh.write(new_content)

          with open(target, "r", encoding="utf-8") as fh:
              verify = fh.read()

          if "NONE" in verify.split("KEY_PH")[1][:30]:
              print("FAILED: NONE still in file after injection")
              sys.exit(1)

          print("Key injected successfully")
          print("ALL PASSED")
          PYEOF

      - name: Verify build
        run: |
          echo "Files in build/:"
          ls -la build/
          JS_COUNT=$(find build/ -name "*.js" | wc -l)
          CSS_COUNT=$(find build/ -name "*.css" | wc -l)
          HTML_COUNT=$(find build/ -name "*.html" | wc -l)
          echo "JS: $JS_COUNT | CSS: $CSS_COUNT | HTML: $HTML_COUNT"
          if [ "$JS_COUNT" -lt 4 ]; then echo "FAILED: Too few JS files"; exit 1; fi
          if [ "$CSS_COUNT" -lt 1 ]; then echo "FAILED: No CSS file"; exit 1; fi
          if [ "$HTML_COUNT" -lt 1 ]; then echo "FAILED: No HTML file"; exit 1; fi
          echo "Build verified OK"

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: './build'
      - id: deployment
        uses: actions/deploy-pages@v4
