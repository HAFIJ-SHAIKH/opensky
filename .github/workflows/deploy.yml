name: Deploy opensky
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        env:
          OPENKEY: ${{ secrets.OPENKEY }}
        run: |
          if [ -z "$OPENKEY" ]; then
            echo "❌ OPENKEY secret is NOT set!"
            echo "Fix: Repo → Settings → Secrets and variables → Actions → New repository secret"
            echo "Name: OPENKEY"
            echo "Value: sk-or-v1-..."
            exit 1
          fi

          echo "✓ Secret found (length: ${#OPENKEY})"

          ENCODED=$(printf '%s' "$OPENKEY" | base64 -w0)
          echo "✓ Base64 encoded (length: ${#ENCODED})"

          mkdir -p build
          cp index.html style.css app.js agent.js tools.js planner.js enhance.js build/
          echo "✓ Files copied to build/"

          if ! grep -q "var KEY_PH = 'NONE';" build/app.js; then
            echo "❌ Placeholder 'var KEY_PH = '\''NONE'\'';' not found in app.js"
            exit 1
          fi

          sed -i "s|var KEY_PH = 'NONE';|var KEY_PH = atob('$ENCODED');|" build/app.js
          echo "✓ Key injected into build/app.js"

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: './build'
      - id: deployment
        uses: actions/deploy-pages@v4
