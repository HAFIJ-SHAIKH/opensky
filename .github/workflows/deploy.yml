name: Deploy opensky
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        env:
          OPENKEY: ${{ secrets.OPENKEY }}
        run: |
          python3 << 'PYEOF'
          import os, re, shutil, sys

          key = os.environ.get("OPENKEY", "")
          os.makedirs("build", exist_ok=True)

          for f in ["index.html","style.css","app.js","agent.js","tools.js","planner.js","enhance.js"]:
              if os.path.exists(f):
                  shutil.copy2(f, "build/"+f)
                  print("COPY  "+f)
              else:
                  print("MISS  "+f)

          with open("build/app.js","r",encoding="utf-8-sig") as fh:
              raw = fh.read()

          # Debug: show every line that mentions KEY_PH
          for i, ln in enumerate(raw.split("\n")):
              if "KEY_PH" in ln:
                  print("FOUND line "+str(i)+": "+repr(ln.strip()))

          # Strategy 1: broad regex
          pat = r"var\s+KEY_PH\s*=\s*['\"][^'\"]*['\"]\s*;"
          m = re.search(pat, raw)

          code = raw
          replaced = False

          if m:
              print("REGEX matched: "+repr(m.group(0)))
              safe = key.replace("\\","\\\\").replace("'","\\'")
              code = raw[:m.start()] + "var KEY_PH = '" + safe + "';" + raw[m.end():]
              replaced = True
          else:
              # Strategy 2: line-by-line fallback
              print("REGEX missed â€” trying line-by-line fallback")
              lines = raw.split("\n")
              for i, ln in enumerate(lines):
                  if "KEY_PH" in ln and "=" in ln and ";" in ln:
                      safe = key.replace("\\","\\\\").replace("'","\\'")
                      lines[i] = "  var KEY_PH = '" + safe + "';"
                      replaced = True
                      print("FALLBACK replaced line "+str(i))
                      break
              code = "\n".join(lines)

          if not replaced:
              print("FATAL: KEY_PH not found in app.js at all")
              sys.exit(1)

          with open("build/app.js","w",encoding="utf-8") as fh:
              fh.write(code)

          # Verify
          with open("build/app.js","r",encoding="utf-8") as fh:
              out = fh.read()
              if key and len(key) >= 10:
                  if key in out and "'NONE'" not in out.split("KEY_PH")[1][:30]:
                      print("VERIFY OK â€” key injected, length="+str(len(key)))
                  else:
                      print("VERIFY FAIL â€” key missing from output")
                      sys.exit(1)
              else:
                  print("VERIFY SKIP â€” no secret, manual mode active")

          PYEOF

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./build
      - id: deployment
        uses: actions/deploy-pages@v4
