name: Deploy opensky
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build
        env:
          OPENKEY: ${{ secrets.OPENKEY }}
        run: |
          echo "→ Creating build folder..."
          mkdir -p build
          echo "→ Copying client files to build/..."
          cp index.html build/
          cp style.css build/
          cp app.js build/
          cp agent.js build/
          cp tools.js build/
          cp planner.js build/
          cp enhance.js build/
          echo "→ Running key injection..."
          node script.js
          echo "→ Build finished successfully."

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: './build'
      - id: deployment
        uses: actions/deploy-pages@v4
