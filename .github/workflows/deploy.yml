name: Deploy opensky
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        env:
          OPENKEY: ${{ secrets.OPENKEY }}
        run: |
          if [ -z "$OPENKEY" ]; then
            echo "OPENKEY secret is missing"
            exit 1
          fi

          mkdir -p build

          for f in index.html style.css app.js agent.js tools.js planner.js enhance.js; do
            if [ -f "$f" ]; then
              cp "$f" build/
            fi
          done

          ENCODED=$(printf '%s' "$OPENKEY" | base64 -w0)

          PLACEHOLDER="var KEY_PH = 'NONE';"
          REPLACEMENT="var KEY_PH = atob('${ENCODED}');"

          sed -i "s|${PLACEHOLDER}|${REPLACEMENT}|" build/app.js

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: './build'
      - id: deployment
        uses: actions/deploy-pages@v4
