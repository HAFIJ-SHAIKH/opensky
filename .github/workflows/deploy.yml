name: Deploy opensky
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        env:
          OPENKEY: ${{ secrets.OPENKEY }}
        run: |
          python3 << 'PYEOF'
          import os, sys

          key = os.environ.get("OPENKEY", "")

          if not key or len(key) < 10:
              print("FAILED: OPENKEY secret is missing or too short (got length " + str(len(key)) + ")")
              print("Fix: Go to Repo > Settings > Secrets and variables > Actions > Repository secrets")
              print("Click 'New repository secret', Name: OPENKEY, Value: your-key-here")
              sys.exit(1)

          print("Secret found. Length: " + str(len(key)))

          import shutil
          os.makedirs("build", exist_ok=True)

          for f in ["index.html", "style.css", "app.js", "agent.js", "tools.js", "planner.js", "enhance.js"]:
              if os.path.exists(f):
                  shutil.copy2(f, "build/" + f)
                  print("Copied: " + f)
              else:
                  print("WARNING: " + f + " not found, skipping")

          with open("build/app.js", "r") as file:
              content = file.read()

          placeholder = "var KEY_PH = 'NONE';"

          if placeholder not in content:
              print("FAILED: Could not find 'var KEY_PH = NONE;' in build/app.js")
              sys.exit(1)

          new_content = content.replace(placeholder, "var KEY_PH = '" + key + "';")

          with open("build/app.js", "w") as file:
              file.write(new_content)

          print("SUCCESS: Key injected into build/app.js")
          PYEOF

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: './build'
      - id: deployment
        uses: actions/deploy-pages@v4
