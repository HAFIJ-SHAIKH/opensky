name: Deploy opensky
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: List repo files
        run: echo "=== All files in repo root ===" && ls -la *.html *.css *.js 2>/dev/null; echo "=== Done ==="

      - name: Inject key and build
        env:
          OPENKEY: ${{ secrets.OPENKEY }}
        run: |
          mkdir -p build

          cp *.html *.css *.js build/ 2>/dev/null
          echo "Files copied to build/:"
          ls -la build/

          echo "Writing inject script..."
          cat > _inject.py << 'PYEOF'
          import os, sys, re, glob

          key = os.environ.get("OPENKEY", "").strip()
          print("Key length: " + str(len(key)))

          if len(key) < 10:
              print("STOPPED: OPENKEY secret is empty or too short")
              sys.exit(1)

          injected = False
          for path in sorted(glob.glob("build/*.js")):
              try:
                  with open(path, "r", encoding="utf-8-sig") as f:
                      raw = f.read()
                  if "KEY_PH" not in raw:
                      continue
                  with open(path, "r", encoding="utf-8-sig") as f:
                      content = f.read()
                  m = re.search(r"var\s+KEY_PH\s*=\s*['\"]NONE['\"]\s*;", content)
                  if not m:
                      print("FOUND KEY_PH in " + path + " but regex did not match")
                      for i, line in enumerate(content.split("\n")):
                          if "KEY_PH" in line:
                              print("  Line " + str(i) + ": " + repr(line))
                      continue
                  escaped = key.replace("\\", "\\\\").replace("'", "\\'")
                  new_content = content[:m.start()] + "var KEY_PH = '" + escaped + "';" + content[m.end():]
                  with open(path, "w", encoding="utf-8") as f:
                      f.write(new_content)
                  with open(path, "r", encoding="utf-8") as f:
                      verify = f.read()
                  if "NONE" in verify.split("KEY_PH")[1][:20]:
                      print("ERROR: NONE still present after write in " + path)
                      sys.exit(1)
                  if key[:8] not in verify:
                      print("ERROR: Key not found after write in " + path)
                      sys.exit(1)
                  print("INJECTED into: " + path)
                  injected = True
              except Exception as e:
                  print("ERROR reading " + path + ": " + str(e))

          if not injected:
              print("STOPPED: No JS file with KEY_PH placeholder found")
              sys.exit(1)

          print("INJECTION COMPLETE")
          PYEOF

          python3 _inject.py
          rm -f _inject.py

      - name: Final verification
        run: |
          echo "=== Final build contents ==="
          ls -la build/
          echo ""
          echo "=== JS files with KEY_PH ==="
          grep -n "KEY_PH" build/*.js || echo "NONE FOUND"
          echo ""
          echo "=== Checking NONE is gone ==="
          if grep -q "'NONE'" build/*.js; then
              echo "FAILED: NONE still present"
              exit 1
          fi
          echo "NONE is gone - GOOD"
          echo ""
          echo "=== File counts ==="
          echo "HTML: $(ls build/*.html 2>/dev/null | wc -l)"
          echo "CSS:  $(ls build/*.css 2>/dev/null | wc -l)"
          echo "JS:   $(ls build/*.js 2>/dev/null | wc -l)"

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: './build'
      - id: deployment
        uses: actions/deploy-pages@v4
